<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Vouchins</title>
  <style>
    :root {
      --background: #020617;
      --foreground: #ffffff;
      --primary: #4FD1C5;
      --primary-hover: #38b2ac;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Lighting Glows */
    .glow-1 {
      position: absolute;
      top: -10%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: rgba(79, 209, 197, 0.08);
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 1;
    }

    .glow-2 {
      position: absolute;
      bottom: -10%;
      left: -10%;
      width: 50%;
      height: 50%;
      background: rgba(10, 27, 92, 0.3);
      border-radius: 50%;
      filter: blur(150px);
      pointer-events: none;
      z-index: 1;
    }

    /* Tech Gridlines */
    .gridlines {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 4rem 4rem;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 440px;
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      z-index: 10;
      position: relative;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      gap: 8px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      background: rgba(79, 209, 197, 0.1);
      border: 1px solid rgba(79, 209, 197, 0.2);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: var(--primary);
      box-shadow: 0 0 20px rgba(79, 209, 197, 0.15);
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    p {
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 32px;
      font-weight: 300;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: var(--primary);
      color: #020617;
      border: none;
      border-radius: 12px;
      padding: 12px 32px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 209, 197, 0.2);
    }

    .btn:active {
      transform: translateY(0);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background-color: #ef4444;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="gridlines"></div>

  <div class="container">
    <div class="logo-container">
      <span class="logo-text">vouchins</span>
    </div>

    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
      </svg>
    </div>

    <div class="status-badge">
      <span class="dot"></span>
      Offline Mode
    </div>

    <h1>Connection Lost</h1>
    <p>It looks like you are currently offline. Check your internet connection and try reloading the page to access your circles.</p>

    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
